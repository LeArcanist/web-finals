{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width:400px; margin:auto;">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p style="margin-top: 12px;">
        No account?
        <a href="{% url 'register' %}">Create one</a>
    </p>
</div>
{% endblock %}
