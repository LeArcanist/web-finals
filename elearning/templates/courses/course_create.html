{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width:650px; margin:auto;">
  <h2>Create a new course</h2>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Create Course</button>
  </form>

  <p style="margin-top: 12px;">
    <a href="{% url 'course_list' %}">Back to Courses</a>
  </p>
</div>
{% endblock %}
